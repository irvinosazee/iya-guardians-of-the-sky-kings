<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a1a0e"/>
      <stop offset="100%" stop-color="#0c0805"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="50%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#b5821e"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a6a"/>
      <stop offset="100%" stop-color="#cc3a24"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="#3a2614" stroke-width="6"/>

  <!-- the Iya: concentric moat rings -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="url(#gold)" stroke-width="20" opacity="0.92"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#7a5414" stroke-width="8" opacity="0.8"/>

  <!-- coral guardian medallion -->
  <circle cx="256" cy="256" r="104" fill="url(#coral)"/>
  <circle cx="256" cy="256" r="104" fill="none" stroke="#7a1f12" stroke-width="6"/>

  <!-- stylized Oba crown / guardian mark -->
  <path d="M256 150 l30 58 64 8 -47 44 12 64 -59-32 -59 32 12-64 -47-44 64-8 z"
        fill="url(#gold)" stroke="#7a5414" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="256" cy="262" r="20" fill="#2a1208"/>
  <circle cx="256" cy="262" r="9" fill="#f0c040"/>
</svg>
